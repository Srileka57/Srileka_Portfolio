<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Selling Web Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#cart">Cart</a></li>
            <li><a href="#order">Order</a></li>
        </ul>
    </nav>

    <!-- Home Section -->
    <section id="home">
        <h1>Welcome to Food Haven!</h1>
        <p>Order your favorite food online!</p>
        <button>View Menu</button>
    </section>

    <!-- Menu Section -->
    <section id="menu">
        <h1>Menu</h1>
        <div class="menu-items">
            <div class="item">
                <img src="burger.jpg" alt="Burger">
                <h2>Burger</h2>
                <p>$10.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="item">
                <img src="pizza.jpg" alt="Pizza">
                <h2>Pizza</h2>
                <p>$14.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="item">
                <img src="salad.jpg" alt="Salad">
                <h2>Salad</h2>
                <p>$8.99</p>
                <button>Add to Cart</button>
            </div>
        </div>
    </section>

    <!-- Cart Section -->
    <section id="cart">
        <h1>Cart</h1>
        <div class="cart-items">
            <!-- items will be added here dynamically -->
        </div>
        <button>Checkout</button>
    </section>

    <!-- Order Section -->
    <section id="order">
        <h1>Confirm Order</h1>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name"><br><br>
            <label for="address">Address:</label>
            <input type="text" id="address" name="address"><br><br>
            <label for="phone">Phone:</label>
            <input type="text" id="phone" name="phone"><br><br>
            <button>Place Order</button>
        </form>
    </section>

    <script>
        // Add event listeners to add to cart buttons
        const addToCartButtons = document.querySelectorAll('.item button');
        const cartItemsDiv = document.querySelector('.cart-items');

        addToCartButtons.forEach(button => {
            button.addEventListener('click', () => {
                const item = button.parentNode;
                const itemName = item.querySelector('h2').textContent;
                const itemPrice = item.querySelector('p').textContent;
                const cartItem = document.createElement('div');
                cartItem.innerHTML = `
                    <h2>${itemName}</h2>
                    <p>${itemPrice}</p>
                `;
                cartItemsDiv.appendChild(cartItem);
            });
        });

        // Add event listener to checkout button
        const checkoutButton = document.querySelector('#cart button');
        checkoutButton.addEventListener('click', () => {
            window.location.href = '#order';
        });

        // Add event listener to place order button
        const placeOrderButton = document.querySelector('#order button');
        placeOrderButton.addEventListener('click', () => {
            alert('Order placed successfully!');
        });
    </script>
</body>
</html>
